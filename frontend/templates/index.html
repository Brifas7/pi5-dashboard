<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi5 Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<!DOCTYPE html>
<html lang="en">
<head>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi5 Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Notification Bar -->
    <div class="notification-bar">
        <div class="notification-item">
            <div class="notif-dot pulse"></div>
            <span><b>Front East</b> — Person Detected — 2m ago</span>
        </div>
        <div class="notification-item">
            <div class="notif-dot green"></div>
            <span><b>Back West</b> — Vehicle Detected — 16m ago</span>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-content">
        <!-- Left Column - Nav -->
        <div class="nav-column">
            <button class="nav-btn" data-menu="cameras">
                <span class="nav-icon">📷</span>
                <span class="nav-label">Cameras</span>
            </button>
            <button class="nav-btn" data-menu="lighting">
                <span class="nav-icon">💡</span>
                <span class="nav-label">Lighting</span>
            </button>
            <button class="nav-btn" data-menu="operations">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Operations</span>
            </button>
            <button class="nav-btn" data-menu="sensors">
                <span class="nav-icon">🌡</span>
                <span class="nav-label">Sensors</span>
            </button>
            <button class="nav-btn" data-menu="settings">
                <span class="nav-icon">🔧</span>
                <span class="nav-label">Settings</span>
            </button>
        </div>

        <!-- Center Column - Clock -->
        <div class="clock-column">
            <div class="clock-container">
                <svg id="clock-svg" viewBox="0 0 400 400" class="clock-face">
                    <!-- Bezel -->
                    <circle cx="200" cy="200" r="195" class="bezel-outer"/>
                    <circle cx="200" cy="200" r="190" class="bezel-inner"/>
                    <circle cx="200" cy="200" r="185" class="clock-bg"/>

                    <!-- Grid lines -->
                    <line x1="200" y1="15" x2="200" y2="385" class="grid-line"/>
                    <line x1="15" y1="200" x2="385" y2="200" class="grid-line"/>
                    <line x1="65" y1="65" x2="335" y2="335" class="grid-line"/>
                    <line x1="335" y1="65" x2="65" y2="335" class="grid-line"/>

                    <!-- Grid circles -->
                    <circle cx="200" cy="200" r="100" class="grid-circle"/>
                    <circle cx="200" cy="200" r="135" class="grid-circle"/>

                    <!-- Tick marks generated by JS -->
                    <g id="tick-marks"></g>

                    <!-- Numbers generated by JS -->
                    <g id="clock-numbers"></g>

                    <!-- Hands -->
                    <line id="hour-hand" x1="200" y1="200" x2="200" y2="115" class="hour-hand"/>
                    <line id="minute-hand" x1="200" y1="200" x2="200" y2="75" class="minute-hand"/>
                    <line id="second-hand" x1="200" y1="200" x2="200" y2="55" class="second-hand"/>

                    <!-- Center hub -->
                    <circle cx="200" cy="200" r="8" class="center-hub"/>
                </svg>
            </div>
            <div class="digital-time" id="digital-time">00:00:00</div>
            <div class="date-display" id="date-display">Monday 3/26/2026</div>
        </div>

        <!-- Right Column - Widgets -->
        <div class="widget-column">
            <!-- Weather -->
            <div class="widget-panel">
                <div class="gauge-grid">
                    <div class="weather-item">
                        <span class="gauge-label">TEMP</span>
                        <span class="gauge-value" id="temp-val">42°F</span>
                    </div>
                    <div class="weather-item">
                        <span class="gauge-label">HUMID</span>
                        <span class="gauge-value" id="humid-val">68%</span>
                    </div>
                    <div class="weather-item">
                        <span class="gauge-label">PRES</span>
                        <span class="gauge-value" id="pres-val">29.92</span>
                    </div>
                    <div class="weather-item">
                        <span class="gauge-label">AQI</span>
                        <span class="gauge-value" id="aqi-val">Good</span>
                    </div>
                </div>
                <div class="moon-phase">
                    <span class="moon-icon">🌙</span>
                    <span class="moon-label" id="moon-label">Waxing Gibbous</span>
                </div>
            </div>

            <!-- System Gauges -->
            <div class="widget-panel">
                <div class="gauge-grid">
                    <div class="system-gauge">
                        <svg viewBox="0 0 64 64" class="gauge-svg">
                            <circle cx="32" cy="32" r="26" class="gauge-bg-ring"/>
                            <circle cx="32" cy="32" r="26" class="gauge-fill-ring" id="cpu-ring" style="stroke-dasharray: 37.6 163.4"/>
                        </svg>
                        <span class="gauge-center-val" id="cpu-val">23%</span>
                        <span class="gauge-label">CPU</span>
                    </div>
                    <div class="system-gauge">
                        <svg viewBox="0 0 64 64" class="gauge-svg">
                            <circle cx="32" cy="32" r="26" class="gauge-bg-ring"/>
                            <circle cx="32" cy="32" r="26" class="gauge-fill-ring" id="hailo-ring" style="stroke-dasharray: 55.6 163.4"/>
                        </svg>
                        <span class="gauge-center-val" id="hailo-val">34%</span>
                        <span class="gauge-label">HAILO</span>
                    </div>
                    <div class="system-gauge">
                        <svg viewBox="0 0 64 64" class="gauge-svg">
                            <circle cx="32" cy="32" r="26" class="gauge-bg-ring"/>
                            <circle cx="32" cy="32" r="26" class="gauge-fill-ring" id="ram-ring" style="stroke-dasharray: 67.0 163.4"/>
                        </svg>
                        <span class="gauge-center-val" id="ram-val">41%</span>
                        <span class="gauge-label">RAM</span>
                    </div>
                    <div class="system-gauge">
                        <svg viewBox="0 0 64 64" class="gauge-svg">
                            <circle cx="32" cy="32" r="26" class="gauge-bg-ring"/>
                            <circle cx="32" cy="32" r="26" class="gauge-fill-ring" id="storage-ring" style="stroke-dasharray: 91.5 163.4"/>
                        </svg>
                        <span class="gauge-center-val" id="storage-val">56%</span>
                        <span class="gauge-label">STORAGE</span>
                    </div>
                </div>
            </div>

            <!-- Automation Button -->
            <button class="automation-btn">
                <span>⚡</span>
                <span>AUTOMATION</span>
            </button>
        </div>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
